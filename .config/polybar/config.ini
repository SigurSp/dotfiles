[bar/main]
width = 99%
offset-x = 0.5%
height = 28
background = #222222
foreground = #ffffff
padding-left = 1
padding-right = 2
module-margin-left = 1
module-margin-right = 1
wm-restack = generic
override-redirect = true
enable-ipc = true
font-0 = "JetBrainsMono Nerd Font:size=8;2"
font-1 = "Symbols Nerd Font Mono:size=10;2"

modules-left = xworkspaces
modules-center = active-window
modules-right = volume wlan battery date

[module/active-window]
type = internal/xwindow
label = [%title%]
label-maxlen = 60
label-foreground = #ffffff
label-padding = 1

[module/xworkspaces]
type = internal/xworkspaces
label-active =  %name%
label-active-foreground = #ffffff
label-active-background = #3b82f6
label-active-underline = #3b82f6
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = #c0c0c0
label-occupied-padding = 1
label-empty = %name%
label-empty-foreground = #6a6a6a
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d %
time = %H:%M
label = %date%%time%

[module/wlan]
type = internal/network
interface = wlan0
interval = 3.0
format-connected = <ramp-signal> <label-connected>
format-disconnected = 󰤭 offline

label-connected = %essid%

; === Signal Strength Ramps ===
ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨

[module/volume]
type = internal/pulseaudio

format-volume = 󰕾 <label-volume>
label-volume = %percentage%%

format-muted = 󰖁 muted
label-muted = muted

[module/battery]
type = internal/battery
battery = BAT1
adapter = ADP1
full-at = 95
low-at = 10
poll-interval = 5

format-discharging = <ramp-capacity> <label-discharging>
format-charging = 󰂄 <label-charging>
format-full = 󰁹 <label-full>
label-full = %percentage%%
label-charging =%percentage%%
label-discharging =%percentage%%

ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁺
ramp-capacity-2 = 󰁻
ramp-capacity-3 = 󰁼
ramp-capacity-4 = 󰁽
ramp-capacity-5 = 󰁾
ramp-capacity-6 = 󰁿
ramp-capacity-7 = 󰂀
ramp-capacity-8 = 󰂁
ramp-capacity-9 = 󰂂
